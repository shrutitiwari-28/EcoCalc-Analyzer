<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deloitte ESG Client Tool | EcoCalc</title>
    <style>
        :root { --deloitte-green: #86bc25; --deloitte-black: #000000; }
        body { font-family: 'Open Sans', Arial, sans-serif; background-color: #f3f3f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; width: 450px; padding: 40px; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 10px solid var(--deloitte-green); }
        h1 { font-size: 24px; margin-bottom: 10px; color: var(--deloitte-black); }
        p.desc { font-size: 13px; color: #666; margin-bottom: 30px; line-height: 1.5; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: var(--deloitte-black); color: white; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: var(--deloitte-green); }
        #results { margin-top: 30px; padding: 20px; border-radius: 4px; display: none; text-align: left; animation: fadeIn 0.5s; }
        .high-impact { background-color: #ffebee; border: 1px solid #ef5350; color: #c62828; }
        .low-impact { background-color: #f1f8e9; border: 1px solid var(--deloitte-green); color: #2e7d32; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>EcoCalc Analyzer</h1>
    <p class="desc">Corporate Sustainability Simulation Tool. Designed to evaluate carbon footprints based on operational energy and waste metrics.</p>
    
    <label>Monthly Energy (kWh)</label>
    <input type="number" id="energy" placeholder="e.g. 1500">
    
    <label>Logistics Travel (Miles)</label>
    <input type="number" id="travel" placeholder="e.g. 450">
    
    <button onclick="runAudit()">RUN ESG AUDIT</button>

    <div id="results"></div>
</div>

<script>
    function runAudit() {
        const energy = document.getElementById('energy').value;
        const travel = document.getElementById('travel').value;
        const resultDiv = document.getElementById('results');

        if (!energy || !travel) {
            alert("Security Protocol: Please provide all data points for the audit.");
            return;
        }

        // Logic: Standard Emission Factors
        // 0.92 kg CO2 per kWh | 0.41 kg CO2 per Mile
        const totalCO2 = (energy * 0.92) + (travel * 0.41);
        const threshold = 1800; // Company-wide safety limit

        resultDiv.style.display = "block";
        
        if (totalCO2 > threshold) {
            resultDiv.className = "high-impact";
            resultDiv.innerHTML = `<strong>AUDIT ALERT:</strong><br>Carbon Impact: ${totalCO2.toFixed(2)} kg CO2e<br>Status: Above Threshold - Mitigation Required.`;
        } else {
            resultDiv.className = "low-impact";
            resultDiv.innerHTML = `<strong>AUDIT PASSED:</strong><br>Carbon Impact: ${totalCO2.toFixed(2)} kg CO2e<br>Status: Sustainable Operations Confirmed.`;
        }
    }
</script>

</body>
</html>
